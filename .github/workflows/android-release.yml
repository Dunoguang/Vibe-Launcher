name: 🚀 Release APK 喵～

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 叼取代码 喵～
        uses: actions/checkout@v7.0.0

      - name: 📦 准备 Node.js 环境 喵～
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: 🏗️ Vite 构建前端 喵～
        run: |
          cd pack
          npm ci
          npm run build
          mkdir -p ../app/src/main/assets && cp dist/index.html ../app/src/main/assets/index.html

      - name: ☕ 准备 JDK 25 喵～
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: '25'

      - name: 🐘 配置 Gradle 喵～
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: 🔐 准备签名配置 喵～
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/vibe-launcher.p12"
            echo "ANDROID_SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/vibe-launcher.p12" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "✅ 签名配置完成 喵～"
          else
            echo "⚠️ 未检测到签名密钥，使用 Debug 签名 喵～"
          fi

      - name: 🔨 构建 Release APK 喵～
        run: gradle --no-daemon :app:assembleRelease

      - name: 🔨 构建 Debug APK 喵～
        run: gradle --no-daemon :app:assembleDebug

      - name: 📦 定位签名 Release APK 喵～
        id: apk
        run: |
          SIGNED=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          cp "$SIGNED" "VibeLauncher-${{ github.ref_name }}-release.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "VibeLauncher-${{ github.ref_name }}-debug.apk"
          ls -lh VibeLauncher-*.apk
          echo "release_apk=VibeLauncher-${{ github.ref_name }}-release.apk" >> "$GITHUB_OUTPUT"
          echo "debug_apk=VibeLauncher-${{ github.ref_name }}-debug.apk" >> "$GITHUB_OUTPUT"

      - name: 📎 创建 GitHub Release 喵～
        uses: softprops/action-gh-release@v2
        with:
          name: Vibe Launcher ${{ github.ref_name }}
          body: |
            ## 🪐 Vibe Launcher ${{ github.ref_name }}

            ### 下载
            - **Release APK**（签名版，推荐）: `VibeLauncher-${{ github.ref_name }}-release.apk`
            - **Debug APK**: `VibeLauncher-${{ github.ref_name }}-debug.apk`

            ### 更新内容
            详见 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

            ---
            🐾 自动构建 by GitHub Actions 喵～
          files: |
            ${{ steps.apk.outputs.release_apk }}
            ${{ steps.apk.outputs.debug_apk }}
          draft: false
          prerelease: false

      - name: 🐾 喵呜～
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✨ Release ${{ github.ref_name }} 发布成功喵！"
          else
            echo "😿 Release 构建失败了呜...主人快来～"
          fi
