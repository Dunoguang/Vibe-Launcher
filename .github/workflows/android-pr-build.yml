name: Android Release Build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Prepare release signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/vibe-launcher.p12"
            echo "ANDROID_SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/vibe-launcher.p12" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "✅ Release signing configured"
          else
            echo "⚠️ Signing secrets not configured, using debug signing"
          fi

      - name: Build release APK
        run: gradle --no-daemon :app:assembleRelease

      - name: Resolve signed APK
        run: |
          SIGNED_APK=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          echo "APK=$SIGNED_APK" >> "$GITHUB_ENV"
          ls -lh "$SIGNED_APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release-apk
          path: ${{ env.APK }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Uploading to release $TAG"
          curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$APK" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$(curl -s -H 'Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' 'https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG' | jq -r .id)/assets?name=Vibe-Launcher-${TAG}.apk"
          echo "✅ APK uploaded to release"
