name: Android PR Build (Release)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Prepare release signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "Signing secrets not fully configured, building debug-signed release APK."
          fi

      - name: Build release APK
        run: gradle --no-daemon :app:assembleRelease

      - name: Show release APK directory
        run: ls -lah app/build/outputs/apk/release || true

      - name: Resolve signed release APK
        run: |
          SIGNED_APK=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          if [ -z "$SIGNED_APK" ]; then
            echo "No signed release APK found."
            ls -lah app/build/outputs/apk/release || true
            exit 1
          fi
          echo "SIGNED_APK_PATH=$SIGNED_APK" >> "$GITHUB_ENV"
          echo "Using signed APK: $SIGNED_APK"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release-apk
          path: ${{ env.SIGNED_APK_PATH }}
          if-no-files-found: error
          retention-days: 7
