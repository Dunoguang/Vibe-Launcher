name: Android Release Build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Prepare release signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/vibe-launcher.p12"
            echo "ANDROID_SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/vibe-launcher.p12" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "ANDROID_SIGNING_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "✅ Release signing configured"
          else
            echo "⚠️ Signing secrets not configured, using debug signing"
          fi

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Build release APK
        run: gradle --no-daemon :app:assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Resolve signed release APK
        run: |
          SIGNED=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          echo "RELEASE_APK=$SIGNED" >> "$GITHUB_ENV"
          ls -lh "$SIGNED"

      - name: Upload release APK to uguu.se
        run: |
          echo "Uploading release APK..."
          RESP=$(curl -sS -F "files[]=@${{ env.RELEASE_APK }}" https://uguu.se/upload)
          URL=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('files',[{}])[0].get('url','FAIL'))")
          echo "Release: $URL"
          echo "$URL" > /tmp/release-uguu-url.txt

      - name: Upload debug APK to uguu.se
        run: |
          echo "Uploading debug APK..."
          RESP=$(curl -sS -F "files[]=@app/build/outputs/apk/debug/app-debug.apk" https://uguu.se/upload)
          URL=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('files',[{}])[0].get('url','FAIL'))")
          echo "Debug: $URL"
          echo "$URL" > /tmp/debug-uguu-url.txt

      - name: Upload uguu.se links
        uses: actions/upload-artifact@v7.0.1
        with:
          name: uguu-links
          path: /tmp/*-uguu-url.txt
          if-no-files-found: error
          retention-days: 7

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-release-apk
          path: ${{ env.RELEASE_APK }}
          if-no-files-found: error
          retention-days: 7
