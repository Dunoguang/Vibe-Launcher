name: 🐾 Android 构建流水线 喵～

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 叼取代码 喵～
        uses: actions/checkout@v7.0.0

      - name: 🛠️ 环境准备 喵～
        uses: actions/setup-node@v6
        with: { node-version: '24' }
      
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v6.2.0

      - name: 🏗️ 构建前端 + 签名 + 打包 喵～
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          # 构建前端
          cd pack
          npm ci
          npm run build
          mkdir -p ../app/src/main/assets
          cp dist/index.html ../app/src/main/assets/index.html
          
          # ⚠️ 重要：回到项目根目录
          cd ..
          
          # 准备签名
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$STORE_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/vibe-launcher.p12"
            export ANDROID_SIGNING_KEYSTORE_PATH="$RUNNER_TEMP/vibe-launcher.p12"
            export ANDROID_SIGNING_STORE_PASSWORD="$STORE_PASSWORD"
            export ANDROID_SIGNING_KEY_ALIAS="$KEY_ALIAS"
            export ANDROID_SIGNING_KEY_PASSWORD="$KEY_PASSWORD"
            echo "✅ 签名配置完成 喵～"
          else
            echo "⚠️ 无签名密钥，将使用 Debug 签名 喵～"
          fi
          
          # 构建
          gradle --no-daemon :app:assembleRelease

      - name: ☁️ 上传并写入 Summary 喵～
        if: success()
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "*-unsigned.apk" | head -1)
          
          if [ ! -f "$APK" ]; then
            echo "❌ 没找到 Release APK 喵..." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "📤 上传中..."
          RESP=$(curl -sS -X POST https://tempfile.org/api/upload/local \
            -F "files=@${APK}" -F "expiryHours=48")
          URL=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['files'][0]['url'] + 'download')")
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🐾 构建完成 喵～
          
          | 📦 产物 | 🔗 链接 | 📏 大小 | ⏰ 有效期 |
          |---------|---------|---------|-----------|
          | Release APK | [点击下载](${URL}) | $(du -h "$APK" | cut -f1) | 48 小时 |
          
          > \`${URL}\`
          EOF
          
          echo "✅ Summary 已生成 喵～"

      - name: 🐾 喵呜～
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✨ 好喵！去 Summary 看链接吧～" >> $GITHUB_STEP_SUMMARY
          else
            echo "😿 坏掉了呜...主人快来～" >> $GITHUB_STEP_SUMMARY
          fi