<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 桌面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            background-color: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body:active {
            cursor: grabbing;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .app-label {
            position: fixed;
            pointer-events: none;
            z-index: 10;
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.75);
            padding: 6px 12px;
            border-radius: 8px;
            letter-spacing: 0.03em;
            opacity: 0;
            transform: translate(-50%, -130%);
            transition: opacity 0.15s ease;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        .app-label.visible {
            opacity: 1;
        }
        .loading-indicator {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.38);
            font-size: 14px;
            letter-spacing: 0.05em;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
    #settings-overlay {
    position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;
    background:rgba(0,0,0,0.3);display:none;justify-content:center;align-items:center;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#settings-card {
    background:rgba(255,255,255,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.3);border-radius:20px;
    width:88vmin;height:88vmin;
    display:flex;flex-direction:column;
    overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2);
    animation:slideUp 0.3s ease;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
#settings-header {
    display:flex;justify-content:space-between;align-items:center;
    padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.06);
}
#settings-title{font-size:18px;font-weight:700;color:#333}
#settings-close-btn{font-size:20px;color:rgba(51,51,51,0.4);cursor:pointer;padding:4px 8px}
#settings-close-btn:hover{color:#333}
#settings-body{padding:16px 20px;overflow-y:auto;flex:1}
#settings-body::-webkit-scrollbar{width:4px}
#settings-body::-webkit-scrollbar-track{background:transparent}
#settings-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px}
#settings-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.25)}
.setting-group{margin-bottom:20px}
.setting-label{font-size:13px;color:rgba(51,51,51,0.6);margin-bottom:8px;display:flex;justify-content:space-between}
.setting-val{color:#8ab4f8;font-weight:600}
.setting-group input[type=range]{
    width:100%;height:6px;-webkit-appearance:none;appearance:none;
    background:rgba(255,255,255,0.08);border-radius:3px;outline:none;
}
.setting-group input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:#8ab4f8;cursor:pointer;box-shadow:0 2px 8px rgba(138,180,248,0.4);
}
.layout-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.layout-card{
    padding:12px 10px;border-radius:10px;text-align:center;cursor:pointer;
    background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.06);
    font-size:13px;color:rgba(255,255,255,0.6);transition:all 0.2s;
}
.layout-card.active,.layout-card:has(input:checked){background:rgba(138,180,248,0.12);border-color:#8ab4f8;color:#fff}
.layout-card input{display:none}
#settings-footer{
    display:flex;gap:10px;padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06);
}
#settings-footer button{
    flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;
    transition:all 0.2s;
}
#s-clear-cache{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}
#s-clear-cache:hover{background:rgba(255,80,80,0.15);color:#ff6b6b}
#s-save{background:#8ab4f8;color:#000}
#s-save:hover{background:#a0c8ff}

#setting-hotreload,#setting-fps{display:flex;align-items:center;justify-content:space-between}
.toggle-desc{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px}
.toggle-switch{position:relative;width:48px;height:26px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.1);border-radius:26px;transition:0.25s}
.toggle-slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.25s}
.toggle-switch input:checked+.toggle-slider{background:#8ab4f8}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(22px)}

/* Settings panel refactor */
.settings-input{width:100%;padding:12px;font-size:15px;background:rgba(255,255,255,0.6);color:#333;border:1px solid rgba(0,0,0,0.1);border-radius:8px;outline:none}
.settings-input:focus{border-color:#4a8ad4}
.settings-btn{flex:1;padding:12px;font-size:14px;background:rgba(255,255,255,0.6);color:#333;border:1px solid rgba(0,0,0,0.1);border-radius:8px;cursor:pointer;transition:all 0.2s}
.settings-btn:hover{background:rgba(255,255,255,0.8);color:#333}
.settings-btn-danger{padding:12px 16px;font-size:14px;background:rgba(255,80,80,0.1);color:#d32f2f;border:1px solid rgba(255,80,80,0.2);border-radius:8px;cursor:pointer;transition:all 0.2s}
.settings-btn-danger:hover{background:rgba(255,80,80,0.2)}
.settings-row{display:flex;gap:8px;align-items:center}
.settings-sphere{display:flex;align-items:center;gap:8px}
.settings-hint{font-size:13px;color:rgba(255,255,255,0.4);white-space:nowrap}
</style>
    <style>
        .panel { width: 90vmin; height: 90vmin; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; position: fixed; top: 0; left: 50%; margin-left: calc(-90vmin / 2); transform: translateY(-100%); transition: none; z-index: 200; padding: 16px; }
        .panel.animate { transition: transform 0.4s cubic-bezier(0.32, 0.94, 0.6, 1); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 6px; width: 100%; height: 100%; }
        .card { background: rgba(255,255,255,0.5); border-radius: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0 10px; cursor: pointer; transition: background 0.2s; -webkit-tap-highlight-color: transparent; user-select: none; }
        .card-wifi { grid-column: 1/3; grid-row: 1/2; }
        .card-data { grid-column: 3/5; grid-row: 1/2; }
        .card-music { grid-column: 1/3; grid-row: 2/4; flex-direction: column; padding: 10px 12px; cursor: default; gap: 6px; overflow: hidden; }
        .music-info { flex: 1; display: flex; flex-direction: column; gap: 2px; overflow: hidden; min-width: 0; width: 100%; }
        .music-title { font-size: 13px; color: #333; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
        .music-artist { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
        .music-controls { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 4px 0; }
        .music-btn { width: 36px; height: 36px; border: none; border-radius: 50%; background: rgba(0,0,0,0.06); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #333; }
        .music-btn svg { fill: none; stroke: #333; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; }
        .music-btn:active { background: rgba(0,0,0,0.15); }
        .music-btn-play { width: 40px; height: 40px; }
        .card.active { background: rgba(255,255,255,0.8); }
        .card.active .icon-circle { background: rgba(51,51,51,0.15); }
        .card.active .card-label { font-weight: 600; }
        .card-bar1 { grid-column: 3/4; grid-row: 2/4; flex-direction: column; padding: 8px 4px 6px; position: relative; overflow: hidden; cursor: pointer; touch-action: none; justify-content: flex-end; }
        .card-bar2 { grid-column: 4/5; grid-row: 2/4; flex-direction: column; padding: 8px 4px 6px; position: relative; overflow: hidden; cursor: pointer; touch-action: none; justify-content: flex-end; }
        .bar-fill { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.6); border-radius: 14px; transition: height 0.05s; pointer-events: none; z-index: 0; }
        .bar-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; pointer-events: none; }
        .bar-icon svg { width: 20px; height: 20px; display: block; fill: none; stroke: #333; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .card-btn1, .card-btn2, .card-btn3, .card-btn4 { cursor: pointer; transition: background 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; }
        .card-btn1.active, .card-btn2.active, .card-btn3.active, .card-btn4.active { background: rgba(255,255,255,0.8); }
        .card-btn1.active .icon-circle, .card-btn2.active .icon-circle, .card-btn3.active .icon-circle, .card-btn4.active .icon-circle { background: rgba(51,51,51,0.15); }
        .icon-circle { width: 36px; height: 36px; background: rgba(255,255,255,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
        .wifi-icon { position: relative; width: 22px; height: 22px; }
        .wifi-icon svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        .signal-icon { display: flex; align-items: flex-end; gap: 1px; height: 18px; }
        .signal-icon .bar { width: 3px; background: #333; border-radius: 1px; }
        .signal-icon .bar1 { height: 4px; } .signal-icon .bar2 { height: 8px; } .signal-icon .bar3 { height: 12px; } .signal-icon .bar4 { height: 16px; }
        .btn-icon svg { width: 20px; height: 20px; display: block; fill: none; stroke: #333; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .card-label { font-size: 13px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: font-weight 0.2s; }
        .data-label { font-size: 13px; color: #333; white-space: nowrap; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
        .btn-label { font-size: 11px; color: #333; white-space: nowrap; margin-top: -2px; }
        .wifi-icon .wifi-arc { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; }
        .wifi-icon .wifi-arc.dim { opacity: 0.2; }
        .wifi-icon .wifi-dot { fill: #333; }
        .wifi-icon .wifi-dot.dim { opacity: 0.2; }
    </style>
</head>
<body>
    <div class="panel" id="panel">
    <div class="grid">
        <div class="card card-wifi" id="wifiCard">
            <div class="icon-circle">
                <div class="wifi-icon" id="wifiIcon">
                    <svg viewBox="0 0 24 24">
                        <path class="wifi-arc" id="arc0" d="M1 7.5a16 16 0 0 1 22 0"/>
                        <path class="wifi-arc" id="arc1" d="M3.5 11.5a12 12 0 0 1 17 0"/>
                        <path class="wifi-arc" id="arc2" d="M7 15.5a7 7 0 0 1 10 0"/>
                        <path class="wifi-arc" id="arc3" d="M10.5 19.5a3 3 0 0 1 3 0"/>
                        <circle class="wifi-dot" id="dot1" cx="12" cy="19.5" r="1.8"/>
                    </svg>
                </div>
            </div>
            <span class="card-label" id="wifiLabel">Wi-Fi</span>
        </div>
        <div class="card card-data" id="dataCard">
            <div class="icon-circle"><div class="signal-icon"><div class="bar bar1"></div><div class="bar bar2"></div><div class="bar bar3"></div><div class="bar bar4"></div></div></div>
            <span class="data-label" id="dataLabel">移动数据</span>
        </div>
        <div class="card card-music" id="musicCard">
            <div class="music-info">
                <span class="music-title" id="musicTitle">未在播放</span>
                <span class="music-artist" id="musicArtist">—</span>
            </div>
            <div class="music-controls">
                <button class="music-btn" id="btnPrev">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M6 5h2v14H6z"/>
                        <path d="M8 12l10-7v14z"/>
                    </svg>
                </button>
                <button class="music-btn music-btn-play" id="btnPlay">
                    <svg viewBox="0 0 24 24" width="22" height="22" id="playIcon">
                        <path d="M8 5l10 7-10 7z"/>
                    </svg>
                    <svg viewBox="0 0 24 24" width="22" height="22" id="pauseIcon" style="display:none">
                        <path d="M8 5h3v14H8z M13 5h3v14h-3z"/>
                    </svg>
                </button>
                <button class="music-btn" id="btnNext">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M18 5h2v14h-2z"/>
                        <path d="M16 12l-9-7v14z"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="card card-bar1" id="brightnessCard">
            <div class="bar-fill" id="brightnessBarFill" style="height:50%;"></div>
            <div class="bar-content"><div class="bar-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></div></div>
        </div>
        <div class="card card-bar2" id="volumeCard">
            <div class="bar-fill" id="volumeBarFill" style="height:40%;"></div>
            <div class="bar-content"><div class="bar-icon"><svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></div></div>
        </div>
        <div class="card card-btn1" id="btnAirplane">
            <div class="icon-circle"><div class="btn-icon"><svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg></div></div>
            <span class="btn-label">飞行模式</span>
        </div>
        <div class="card card-btn2" id="btnFlashlight">
            <div class="icon-circle"><div class="btn-icon"><svg viewBox="0 0 24 24"><path d="M9 18c-4 0-6-2-6-6s2-6 6-6 6 2 6 6-2 6-6 6z"/><path d="M15 9l6-6"/><path d="M15 15l6 6"/></svg></div></div>
            <span class="btn-label">手电筒</span>
        </div>
        <div class="card card-btn3" id="btnLock">
            <div class="icon-circle"><div class="btn-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div></div>
            <span class="btn-label">锁屏</span>
        </div>
        <div class="card card-btn4" id="btnSettings">
            <div class="icon-circle"><div class="btn-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div></div>
            <span class="btn-label">设置</span>
        </div>
    </div>
</div>
    <div id="time-page" style="
        position:fixed; top:0; left:0; width:100vw; height:100vh;
        visibility:hidden; z-index:-1;
        background:transparent; color:#fff;
        font-family:'SF Pro Display','Segoe UI','PingFang SC','Helvetica Neue',sans-serif;
        display:flex; flex-direction:column; justify-content:flex-start; align-items:center;
        padding-top:8vh;
    ">
        <div id="time-page-clock" style="
            text-align:center; font-size:26vw; font-weight:bold; line-height:1;
            color:rgba(255,255,255,0.5);
            text-shadow:0 0 4vw rgba(255,255,255,0.25);
        ">12:00</div>
        <div id="time-page-date" style="
            text-align:center; font-size:5vw; margin-top:2vh;
            color:rgba(255,255,255,0.7);
        ">1月1日 周一</div>
        <div style="flex:1;"></div>
        <div id="time-page-battery" style="
            text-align:center; font-size:4vw; padding-bottom:5vh;
            color:rgba(255,255,255,0.5); display:flex; align-items:center; justify-content:center; gap:8px;
        ">
            <svg viewBox="0 0 24 24" width="4vw" height="4vw" style="display:block">
                <rect x="2" y="7" width="17" height="10" rx="2" ry="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <line x1="19" y1="11" x2="21" y2="11" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                <rect x="4" y="9" width="13" height="6" rx="1" fill="rgba(255,255,255,0.4)" id="batteryFill"/>
            </svg>
            <span id="batteryPct">--%</span>
        </div>
    </div>
    <div id="context-menu" style="
        position:fixed; z-index:90; display:none; pointer-events:auto;
        background:#1a1a2e; border:1px solid rgba(255,255,255,0.2);
        border-radius:12px; padding:6px 0; min-width:140px; flex-direction:column;
        box-shadow:0 8px 24px rgba(0,0,0,0.5);
    ">
        <div id="ctx-app-info" style="
            padding:12px 18px; font-size:16px; color:#fff;
            cursor:pointer; white-space:nowrap;
        ">📋 应用信息</div>
        <div id="ctx-uninstall" style="
            padding:12px 18px; font-size:16px; color:#ff6b6b;
            cursor:pointer; white-space:nowrap;
        ">🗑 卸载</div>
    </div>
    <div id="settings-overlay">
        <div id="settings-card">
            <div id="settings-header">
                <span id="settings-title">⚙ 设置</span>
                <span id="settings-close-btn">✕</span>
            </div>
            <div id="settings-body">
                <div class="setting-group">
                    <div class="setting-label">图标分辨率 <span class="setting-val" id="s-icon-val">512px</span></div>
                    <input id="s-icon" type="number" value="512" min="64" max="1024" step="16" class="settings-input">
                </div>
                <div class="setting-group">
                    <div class="setting-label">3D球体大小 <span id="sphere-min-hint" class="setting-val">最少 0</span></div>
                    <div id="settings-sphere-size" class="settings-sphere">
                        <input id="settings-sphere-input" type="number" value="2.5" min="0" step="0.1" class="settings-input" style="flex:1">
                    </div>
                </div>
                <div class="setting-group">
                    <div class="setting-label">动画速度 <span class="setting-val">毫秒</span></div>
                    <input id="settings-anim-input" type="number" value="250" min="10" max="5000" step="10" class="settings-input">
                </div>
                <div class="setting-group">
                    <div class="setting-label">布局模式</div>
                    <div class="layout-grid">
                        <label class="layout-card" onclick="setRadio('layoutMode','sphere')"><input type="radio" name="layoutMode" value="sphere" checked><span>🌐 球体</span></label>
                        <label class="layout-card" onclick="setRadio('layoutMode','hemisphere')"><input type="radio" name="layoutMode" value="hemisphere"><span>🌓 半球</span></label>
                        <label class="layout-card" onclick="setRadio('layoutMode','ring')"><input type="radio" name="layoutMode" value="ring"><span>🔄 竖环</span></label>
                        <label class="layout-card" onclick="setRadio('layoutMode','hbar')"><input type="radio" name="layoutMode" value="hbar"><span>↔ 横环</span></label>
                    </div>
                </div>


                <div class="setting-group">
                    <div class="setting-label">时间页面背景</div>
                    <div class="toggle-desc">建议使用正方形高清图片获得最佳体验</div>
                    <div class="settings-row">
                        <button id="s-timebg-pick" class="settings-btn">选择图片</button>
                        <button id="s-timebg-remove" class="settings-btn-danger">移除</button>
                    </div>
                </div>
                <div class="setting-group">
                    <div class="setting-label">壁纸</div>
                    <div class="settings-row">
                        <button id="s-wallpaper-pick" class="settings-btn">选择图片</button>
                        <button id="s-wallpaper-remove" class="settings-btn-danger">移除</button>
                    </div>
                </div>
                <div class="setting-group">
                    <div id="setting-fps">
                        <div>
                            <div style="font-size:13px;color:rgba(255,255,255,0.8)">显示FPS</div>

                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="s-fps">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                <div id="setting-hotreload">
                        <div>
                            <div style="font-size:13px;color:rgba(255,255,255,0.8)">热加载HTML（调试）</div>

                        <label class="toggle-switch">

                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
            <div id="settings-footer">
                <button id="s-clear-cache">清除图标缓存</button>

        </div>
    </div>
    <div id="fps-counter" style="position:fixed;top:8px;left:8px;z-index:2147483647;color:#0f0;font-size:16px;font-family:monospace;background:rgba(0,0,0,0.8);padding:4px 8px;border-radius:4px;display:none;pointer-events:none;user-select:none;font-weight:bold">FPS: <span id="fps-value">0</span></div>
    <div class="app-label" id="appLabel"></div>
