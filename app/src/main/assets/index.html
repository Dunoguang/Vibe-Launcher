<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Vibe Launcher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
body:active{cursor:grabbing}
canvas{display:block}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:5vw;z-index:200;transition:opacity .4s}
#time-page{position:fixed;top:0;left:0;width:100vw;height:100vh;visibility:hidden;z-index:-1;background:#0a0e18;color:#fff}
#time-page-clock{position:absolute;top:5vh;left:0;right:0;text-align:center;font-size:26vw;font-weight:700;text-shadow:0 0 3vw rgba(255,255,255,.4)}
#time-page-date{position:absolute;top:22vh;left:0;right:0;text-align:center;font-size:5vw;color:rgba(255,255,255,.7)}
#time-page-battery{position:absolute;bottom:5vh;left:0;right:0;text-align:center;font-size:4vw;color:rgba(255,255,255,.5)}
#context-menu{position:fixed;z-index:90;display:none;background:rgba(30,30,40,.95);border-radius:12px;padding:6px 0;min-width:130px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#context-menu div{padding:10px 18px;font-size:14px;color:#ddd;cursor:pointer}
#context-menu div:hover{background:rgba(255,255,255,.1)}
#settings-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.7);z-index:80;display:none;justify-content:center;align-items:center;color:#fff}
#settings-panel{background:rgba(30,30,45,.95);border-radius:16px;padding:24px;width:80vw;max-width:380px}
#settings-panel h3{margin:0 0 16px;font-size:18px}
#settings-panel label{display:block;margin:12px 0 4px;font-size:13px;color:#aaa}
#settings-panel input[type=range],#settings-panel input[type=number]{width:100%;margin-bottom:8px}
#settings-panel button{margin-top:16px;padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer}
#settings-close{background:0 0;color:#aaa;border:1px solid #aaa;margin-right:8px}
#settings-save{background:#4a90d9;color:#fff}
.layout-options{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.layout-options label{margin:0;font-size:12px;color:#ccc}
#appLabel{position:fixed;bottom:6vh;left:50%;transform:translateX(-50%);color:#fff;font-size:3.5vw;z-index:50;text-align:center;pointer-events:none;text-shadow:0 0 10px rgba(0,0,0,.7);transition:opacity .2s}
</style>
</head>
<body>
<div id="loading">加载中...</div>
<div id="time-page">
  <div id="time-page-clock">12:00</div>
  <div id="time-page-date">1月1日 周一</div>
  <div id="time-page-battery">🔋 --%</div>
</div>
<div id="context-menu">
  <div id="ctx-app-info">应用信息</div>
  <div id="ctx-uninstall">卸载</div>
</div>
<div id="settings-overlay">
  <div id="settings-panel">
    <h3>设置</h3>
    <label>图标分辨率: <span id="settings-icon-val">512</span></label>
    <input id="settings-icon-input" type="range" min="64" max="1024" step="16" value="512">
    <label>球体大小: <span id="settings-sphere-val">2.5</span></label>
    <input id="settings-sphere-input" type="range" min="1" max="10" step="0.1" value="2.5">
    <label>布局模式:</label>
    <div class="layout-options">
      <label><input type="radio" name="layoutMode" value="sphere" checked> 球体</label>
      <label><input type="radio" name="layoutMode" value="hemisphere"> 半球</label>
      <label><input type="radio" name="layoutMode" value="ring"> 环</label>
      <label><input type="radio" name="layoutMode" value="hbar"> 水平条</label>
    </div>
    <button id="settings-close">关闭</button>
    <button id="settings-save">保存</button>
  </div>
</div>
<div id="appLabel"></div>

<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.185.1/build/three.module.js", "three/webgpu": "https://unpkg.com/three@0.185.1/build/three.webgpu.js" } }
</script>
<script type="module">
import * as THREE from 'three/webgpu';
window.THREE = THREE;
(function() {
"use strict";
console.log("IIFE starting, THREE:", typeof THREE);
// Redirect console to NativeBridge
const _origLog = console.log;
console.log = (...args) => {
    _origLog.apply(console, args);
    try { if ($.bridgeReady) NativeBridge.log(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')); } catch(e) {}
};

// ================================================================
// CONSTANTS
// ================================================================
const FAR_PLANE = 1e8;
const BASE_SCALE = 0.52;
const FOV = 50;
const FOV_RAD = THREE.MathUtils.degToRad(FOV);
const MIN_ZOOM = 0.1;
const ROTATION_ANIM_DURATION = 400;
const DRAG_THRESHOLD = 3;
const INERTIA_DECAY = 0.92;
const INERTIA_FAST_DECAY = 0.85;
const INERTIA_MIN = 0.001;
const LONG_PRESS_MS = 600;
const SPEED_SAMPLES = 5;
const TOP_ZONE_RATIO = 0.15;
const BOTTOM_ZONE_RATIO = 0.15;
const EXIT_THRESHOLD_RATIO = 0.35;

const PLACEHOLDER_COLORS = [
    '#ff6b6b','#ff8e72','#ffa94d','#ffd43b','#a9e34b',
    '#69db7c','#38d9a9','#3bc9db','#4dabf7','#5c7cfa',
    '#748ffc','#9775fa','#da77f2','#f783ac','#ff8787',
];

// ================================================================
// CLASS: App — single source of truth
// ================================================================
class App {
    constructor() {
        // DOM
        this.labelEl = document.getElementById('appLabel');
        this.loadingEl = document.getElementById('loading');
        this.timePage = document.getElementById('time-page');
        this.timeClock = document.getElementById('time-page-clock');
        this.timeDate = document.getElementById('time-page-date');
        this.timeBattery = document.getElementById('time-page-battery');
        this.ctxMenu = document.getElementById('context-menu');
        this.settingsOverlay = document.getElementById('settings-overlay');

        // Three.js (set in init)
        this.scene = null;
        this.camera = null;
        this.renderer = null;
        this.rendererType = 'unknown';
        this.canvas = null;
        this.sphereGroup = null;

        // Layout
        this.N = 0;
        this.radius = 2.5;
        this.diameter = 5.0;
        this.layoutMode = 'sphere';

        // Zoom
        this.zoom = 0;
        this.defaultZoom = 0;
        this.timeViewZoom = 0;

        // Rotation (quaternion of sphereGroup)
        this.quat = new THREE.Quaternion();

        // Time view
        this.inTimeView = false;
        this.timeSprite = null;
        this.timeTexInterval = null;

        // Gesture
        this.dragging = false;
        this.moved = false;
        this.prev = new THREE.Vector2();
        this.mouse = new THREE.Vector2();
        this.hovered = null;
        this.pointers = new Set();
        this.longPressTimer = null;
        this.longPressFired = false;
        this.menuOpen = false;

        // Zoom animation
        this.zTarget = null;
        this.zStart = null;
        this.zDuration = 0;
        this.zElapsed = 0;
        this.zFrom = 0;
        this.zTo = 0;
        this.zCallback = null;

        // Rotation animation
        this.rData = null;

        // Inertia
        this.iQuat = new THREE.Quaternion();
        this.iStrength = 0;
        this.iInfinite = false;
        this.speeds = [];

        // Swipe
        this.bottomSwipe = null;
        this.topSwipe = null;

        // Icons
        this.iconRes = 512;
        this.pendingIcons = 0;
        this.sprites = [];
        this.apps = [];
        this.totalItems = [];

        // Bridge
        this.bridgeReady = false;
        this._allPkgs = null;
        this._lastSettingsClick = 0;
    }

    resetGesture() {
        this.dragging = false;
        this.moved = false;
        this.speeds = [];
    }
}

const $ = new App();

console.log("State initialized");

// ================================================================
// ALGORITHM: sphereCoulomb
// ================================================================
const sphereCoulomb = (N, opts = {}) => {
    const { radius = 1, iter = 400, damp = 0.985, dt = 0.03, tol = 1e-6, soft = 0.01 } = opts;
    if (N <= 0) return [];
    if (N === 1) return [[0, 0, radius]];
    const p = Array.from({ length: N }, () => {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        return [radius * Math.sin(phi) * Math.cos(theta), radius * Math.sin(phi) * Math.sin(theta), radius * Math.cos(phi)];
    });
    const v = Array.from({ length: N }, () => [0, 0, 0]);
    const f = Array.from({ length: N }, () => [0, 0, 0]);
    for (let t = 0; t < iter; t++) {
        for (let i = 0; i < N; i++) f[i][0] = f[i][1] = f[i][2] = 0;
        let maxForce = 0;
        for (let i = 0; i < N; i++) {
            for (let j = i + 1; j < N; j++) {
                let dx = p[i][0] - p[j][0], dy = p[i][1] - p[j][1], dz = p[i][2] - p[j][2];
                const dist2 = dx * dx + dy * dy + dz * dz + soft;
                const dist = Math.sqrt(dist2);
                const force = 1 / dist2;
                const fx = force * dx / dist, fy = force * dy / dist, fz = force * dz / dist;
                f[i][0] += fx; f[i][1] += fy; f[i][2] += fz;
                f[j][0] -= fx; f[j][1] -= fy; f[j][2] -= fz;
                maxForce = Math.max(maxForce, Math.abs(fx), Math.abs(fy), Math.abs(fz));
            }
        }
        if (maxForce < tol) break;
        for (let i = 0; i < N; i++) {
            v[i][0] = (v[i][0] + f[i][0] * dt) * damp;
            v[i][1] = (v[i][1] + f[i][1] * dt) * damp;
            v[i][2] = (v[i][2] + f[i][2] * dt) * damp;
            p[i][0] += v[i][0] * dt; p[i][1] += v[i][1] * dt; p[i][2] += v[i][2] * dt;
            const r2 = p[i][0]*p[i][0] + p[i][1]*p[i][1] + p[i][2]*p[i][2];
            const s = radius / Math.sqrt(r2);
            p[i][0] *= s; p[i][1] *= s; p[i][2] *= s;
        }
    }
    return p;
};

// ================================================================
// SCENE SETUP
// ================================================================
const initScene = async () => {
    $.scene = new THREE.Scene();
    $.scene.background = new THREE.Color(0x000000);

    $.camera = new THREE.PerspectiveCamera(FOV, window.innerWidth / window.innerHeight, 0.1, FAR_PLANE);

    // Try WebGPU, fall back to WebGL
    try {
        $.renderer = new THREE.WebGPURenderer({ antialias: true, alpha: false });
        $.rendererType = 'webgpu';
    } catch (e) {
        try {
            $.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            $.rendererType = 'webgl2';
            const ctx = $.renderer.getContext();
            if (ctx && !ctx.getParameter(ctx.VERSION).includes('WebGL 2')) {
                $.rendererType = 'webgl1';
            }
        } catch (e2) {
            $.renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
            $.rendererType = 'webgl1-fallback';
        }
    }
    $.renderer.setSize(window.innerWidth, window.innerHeight);
    $.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild($.renderer.domElement);
    $.canvas = $.renderer.domElement;
    await $.renderer.init();
    console.log('Renderer:', $.rendererType);

    // Lighting
    const amb = new THREE.AmbientLight(0x8899bb, 2.4);
    $.scene.add(amb);
    const dl = new THREE.DirectionalLight(0xffffff, 1.8);
    dl.position.set(1, 1, 2);
    $.scene.add(dl);
    const dl2 = new THREE.DirectionalLight(0x8899cc, 0.9);
    dl2.position.set(-1, -0.5, -1);
    $.scene.add(dl2);

    // Sphere group
    $.sphereGroup = new THREE.Group();
    $.scene.add($.sphereGroup);

    // Initial zoom
    const w = window.innerWidth, h = window.innerHeight;
    const sef = Math.min(1, w / h);
    const minVis = $.diameter / (2 * Math.tan(FOV_RAD / 2) * sef);
    $.zoom = minVis * 1.15;
    $.defaultZoom = $.zoom;
    $.camera.position.set(0, 0, $.zoom);
};

const computeTimeViewZoom = () => {
    const R = BASE_SCALE * 0.44;
    const fovHalf = THREE.MathUtils.degToRad($.camera.fov / 2);
    const aspect = window.innerWidth / window.innerHeight;
    const halfDiag = Math.sqrt(aspect * aspect + 1);
    return $.radius + R / (Math.tan(fovHalf) * halfDiag);
};

console.log("Scene + sphereCoulomb ready");

// ================================================================
// TEXTURE GENERATION
// ================================================================
const createGearTexture = () => {
    const s = Math.max(16, $.iconRes);
    const c = document.createElement('canvas'); c.width = s; c.height = s;
    const ctx = c.getContext('2d');
    const cx = s / 2, cy = s / 2, r = s * 0.44;
    ctx.fillStyle = '#8899bb';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#aabbcc'; ctx.lineWidth = s * 0.06;
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${s*0.35}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚙', cx, cy);
    return new THREE.CanvasTexture(c);
};

const createTimeTexture = () => {
    const s = Math.max(window.innerWidth, window.innerHeight);
    const c = document.createElement('canvas'); c.width = s; c.height = s;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0a0e18'; ctx.fillRect(0, 0, s, s);
    ctx.strokeStyle = '#334466'; ctx.lineWidth = s * 0.004;
    ctx.beginPath(); ctx.arc(s/2, s/2, s*0.44, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#8899bb'; ctx.font = `bold ${s*0.08}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🕐', s/2, s/2);
    return new THREE.CanvasTexture(c);
};

const createPlaceholderTexture = (appName, colorHex) => {
    const s = Math.max(16, $.iconRes);
    const c = document.createElement('canvas'); c.width = s; c.height = s;
    const ctx = c.getContext('2d');
    const cx = s / 2, cy = s / 2, r = s * 0.44;
    ctx.fillStyle = colorHex || '#667788';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    const initial = (appName || '?')[0].toUpperCase();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${s*0.45}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(initial, cx, cy);
    return new THREE.CanvasTexture(c);
};

const createIconTextureFromImage = (img) => {
    const s = Math.max(16, $.iconRes);
    const c = document.createElement('canvas'); c.width = s; c.height = s;
    const ctx = c.getContext('2d');
    ctx.beginPath(); ctx.arc(s/2, s/2, s*0.44, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(img, 0, 0, s, s);
    return new THREE.CanvasTexture(c);
};

// ================================================================
// SPRITE MANAGEMENT
// ================================================================
const createSprites = (appList, iconMap) => {
    // Clear old
    $.sprites.forEach(s => { if (s.material.map) s.material.map.dispose(); s.material.dispose(); });
    $.sprites = [];
    while ($.sphereGroup.children.length > 0) $.sphereGroup.remove($.sphereGroup.children[0]);

    const N = appList.length + 2; // +time +settings
    $.N = N;
    $.totalItems = [
        { type: 'time', app: null },
        ...appList.map(a => ({ type: 'app', app: a })),
        { type: 'settings', app: { packageName: '__settings__', appName: '设置', isSystem: true } },
    ];

    let raw = sphereCoulomb(N, { radius: $.radius, iter: 500 });

    // Convert to Vector3 array
    let points = raw.map(p => new THREE.Vector3(p[0], p[1], p[2]));

    // Layout mode transformations
    if ($.layoutMode === 'ring') {
        points = points.map(p => { p.z = 0; return p.normalize().multiplyScalar($.radius); });
    } else if ($.layoutMode === 'hbar') {
        const halfCount = Math.floor(N / 2);
        const spacing = ($.radius * 2) / (N - 1);
        points = [];
        for (let i = 0; i < N; i++) {
            points.push(new THREE.Vector3(-$.radius + i * spacing, 0, 0));
        }
    } else if ($.layoutMode === 'hemisphere') {
        points = points.filter(p => p.z >= 0);
        const extra = N - points.length;
        for (let i = 0; i < extra; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI / 2;
            points.push(new THREE.Vector3(
                $.radius * Math.sin(phi) * Math.cos(theta),
                $.radius * Math.sin(phi) * Math.sin(theta),
                $.radius * Math.cos(phi)
            ));
        }
    }

    // Align time sprite to camera
    const tIdx = $.totalItems.findIndex(it => it.type === 'time');
    if (tIdx >= 0 && tIdx < points.length) {
        const tp = points[tIdx].clone();
        const aq = new THREE.Quaternion().setFromUnitVectors(tp.normalize(), new THREE.Vector3(0, 0, 1));
        points = points.map(v => v.clone().applyQuaternion(aq));
        if ($.layoutMode === 'hemisphere') points.sort((a, b) => b.z - a.z);
    }

    for (let i = 0; i < $.totalItems.length; i++) {
        const item = $.totalItems[i];
        const pos = points[i];
        let tex;
        if (item.type === 'time') {
            tex = createTimeTexture();
        } else if (item.type === 'settings') {
            tex = createGearTexture();
        } else if (iconMap && iconMap[item.app.packageName]) {
            tex = createPlaceholderTexture(item.app.appName, PLACEHOLDER_COLORS[i % PLACEHOLDER_COLORS.length]);
        } else {
            const ci = i % PLACEHOLDER_COLORS.length;
            tex = createPlaceholderTexture(item.app.appName, PLACEHOLDER_COLORS[ci]);
        }

        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false });
        const sprite = new THREE.Sprite(mat);
        sprite.position.set(pos.x, pos.y, pos.z);
        sprite.scale.set(BASE_SCALE, BASE_SCALE, 1);
        sprite.userData = { item, app: item.app, colorIdx: i % PLACEHOLDER_COLORS.length, hasRealIcon: false };
        $.sphereGroup.add(sprite);
        $.sprites.push(sprite);

        if (item.type === 'time') $.timeSprite = sprite;
    }
};

// Raycaster
const raycaster = new THREE.Raycaster();
raycaster.far = FAR_PLANE;

const checkHover = () => {
    raycaster.setFromCamera($.mouse, $.camera);
    const hits = raycaster.intersectObjects($.sprites);
    const prev = $.hovered;
    if (hits.length > 0) {
        const spr = hits[0].object;
        if (spr !== prev) {
            if (prev) prev.scale.set(BASE_SCALE, BASE_SCALE, 1);
            $.hovered = spr;
            spr.scale.set(BASE_SCALE * 1.4, BASE_SCALE * 1.4, 1);
            $.labelEl.style.opacity = '1';
            const app = spr.userData.app;
            $.labelEl.textContent = spr.userData.item.type === 'time' ? '时间'
                : spr.userData.item.type === 'settings' ? '设置'
                : (app ? app.appName : '');
        }
    } else {
        if (prev) { prev.scale.set(BASE_SCALE, BASE_SCALE, 1); $.hovered = null; }
        $.labelEl.style.opacity = '0';
    }
};
const clearHover = () => {
    if ($.hovered) { $.hovered.scale.set(BASE_SCALE, BASE_SCALE, 1); $.hovered = null; }
    $.labelEl.style.opacity = '0';
};

console.log("Textures + Sprites ready");

// ================================================================
// CLASS: Animator
// ================================================================
class Animator {
    ease(t) { return 1 - Math.pow(1 - t, 3); }

    applyZoom() { $.camera.position.z = $.zoom; }

    startZoom(to, dur, cb) {
        $.zStart = performance.now();
        $.zDuration = dur || 500;
        $.zFrom = $.zoom;
        $.zTo = to;
        $.zElapsed = 0;
        $.zTarget = to;
        $.zCallback = cb || null;
    }

    cancelZoom() {
        $.zTarget = null; $.zStart = null;
        $.zDuration = 0; $.zCallback = null;
    }

    updateZoom(now) {
        if ($.zTarget === null) return;
        $.zElapsed = now - $.zStart;
        const t = Math.min(1, $.zElapsed / $.zDuration);
        $.zoom = $.zFrom + ($.zTo - $.zFrom) * this.ease(t);
        this.applyZoom();
        if (t >= 1) { $.zoom = $.zTo; this.applyZoom(); const cb = $.zCallback; this.cancelZoom(); if (cb) cb(); }
    }

    startRot(to, dur, cb) {
        $.rData = {
            from: $.quat.clone(), to: to.clone(),
            start: performance.now(), dur: dur || ROTATION_ANIM_DURATION, cb: cb || null
        };
    }

    updateRot(now) {
        if (!$.rData) return;
        const t = Math.min(1, (now - $.rData.start) / $.rData.dur);
        $.quat.copy($.rData.from).slerp($.rData.to, this.ease(t));
        $.sphereGroup.quaternion.copy($.quat);
        if (t >= 1) { $.quat.copy($.rData.to); $.sphereGroup.quaternion.copy($.quat); const cb = $.rData.cb; $.rData = null; if (cb) cb(); }
    }

    updateInertia() {
        if ($.iStrength <= INERTIA_MIN || $.inTimeView || $.rData) return;
        const decay = ($.dragging && $.moved) ? INERTIA_FAST_DECAY : INERTIA_DECAY;
        const q = new THREE.Quaternion().slerpQuaternions(new THREE.Quaternion(), $.iQuat, Math.min($.iStrength, 1));
        $.quat.premultiply(q).normalize();
        $.sphereGroup.quaternion.copy($.quat);
        if (!$.iInfinite) { $.iStrength *= decay; if ($.iStrength < INERTIA_MIN) { $.iStrength = 0; $.iQuat.identity(); } }
    }

    update(ts) {
        const now = ts || performance.now();
        this.updateZoom(now);
        this.updateRot(now);
        this.updateInertia();
        $.renderer.render($.scene, $.camera);
    }
}
const anim = new Animator();

// ================================================================
// CLASS: TimeView
// ================================================================
class TimeView {
    enter(animate, onDone) {
        if ($.inTimeView || !$.timeSprite) return;
        $.inTimeView = true;
        anim.cancelZoom(); $.rData = null;
        $.iQuat.identity(); $.iStrength = 0;
        clearHover(); document.body.style.cursor = 'default';
        $.timeViewZoom = computeTimeViewZoom();
        if (animate) {
            anim.startZoom($.timeViewZoom, 300, () => {
                $.zoom = $.timeViewZoom; anim.applyZoom();
                this._showPage(); if (onDone) onDone();

class Gestures {

            -(sy / window.innerHeight) * 2 + 1, 0.5);

    }

// CLASS: Actions (cancelable)

        });

    cancel(reason) {

            const demo = [
                { packageName: 'demo.1', appName: '时钟', isSystem: true },
                { packageName: 'demo.2', appName: '相册', isSystem: true },
                { packageName: 'demo.3', appName: '音乐', isSystem: false },
                { packageName: 'demo.4', appName: '浏览器', isSystem: false },
                { packageName: 'demo.5', appName: '日历', isSystem: true },
                { packageName: 'demo.6', appName: '计算器', isSystem: true },
            ];
            $.apps = demo;
            $.totalItems = [
                { type: 'time', app: null },
                ...demo.map(a => ({ type: 'app', app: a })),
                { type: 'settings', app: { packageName: '__settings__', appName: '设置', isSystem: true } },
            ];
            createSprites(demo, null);
            $.loadingEl.style.opacity = '0';
            setTimeout(() => { if ($.loadingEl.parentNode) $.loadingEl.remove(); }, 500);
        }
    }, 3000);

    // Start loop
    const loop = (ts) => { anim.update(ts); requestAnimationFrame(loop); };
    requestAnimationFrame(loop);

    // Battery
    setInterval(updateBattery, 60000);
    setTimeout(updateBattery, 3000);

    console.log('🚀 Vibe Launcher ready (class-based)');
};

init();

})();
</script>
</body>
</html>
