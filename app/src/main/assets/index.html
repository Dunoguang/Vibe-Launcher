<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 桌面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body:active {
            cursor: grabbing;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .app-label {
            position: fixed;
            pointer-events: none;
            z-index: 10;
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.75);
            padding: 6px 12px;
            border-radius: 8px;
            letter-spacing: 0.03em;
            opacity: 0;
            transform: translate(-50%, -130%);
            transition: opacity 0.15s ease;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        .app-label.visible {
            opacity: 1;
        }
        .loading-indicator {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.38);
            font-size: 14px;
            letter-spacing: 0.05em;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>
    <div id="time-page" style="
        position:fixed; top:0; left:0; width:100vw; height:100vh;
        visibility:hidden; z-index:-1;
        background:#0a0e18; color:#fff;
        font-family:'SF Pro Display','Segoe UI','PingFang SC','Helvetica Neue',sans-serif;
    ">
        <div id="time-page-clock" style="
            position:absolute; top:5vh; left:0; right:0;
            text-align:center; font-size:26vw; font-weight:bold;
            color:#fff;
            text-shadow:0 0 3vw rgba(255,255,255,0.4);
        ">12:00</div>
        <div id="time-page-date" style="
            position:absolute; top:22vh; left:0; right:0;
            text-align:center; font-size:5vw;
            color:rgba(255,255,255,0.7);
        ">1月1日 周一</div>
        <div id="time-page-battery" style="
            position:absolute; bottom:5vh; left:0; right:0;
            text-align:center; font-size:4vw;
            color:rgba(255,255,255,0.5);
        ">🔋 --%</div>
    </div>
    <div id="context-menu" style="
        position:fixed; z-index:90; display:none; pointer-events:auto;
        background:#1a1a2e; border:1px solid rgba(255,255,255,0.2);
        border-radius:12px; padding:6px 0; min-width:140px;
        box-shadow:0 8px 24px rgba(0,0,0,0.5);
    ">
        <div id="ctx-app-info" style="
            padding:12px 18px; font-size:16px; color:#fff;
            cursor:pointer; white-space:nowrap;
        ">📋 应用信息</div>
        <div id="ctx-uninstall" style="
            padding:12px 18px; font-size:16px; color:#ff6b6b;
            cursor:pointer; white-space:nowrap;
        ">🗑 卸载</div>
    </div>
    <div id="settings-overlay" style="
        position:fixed; top:0; left:0; right:0; bottom:0;
        background:rgba(0,0,0,0.85); z-index:50; display:none; pointer-events:auto;
        color:#fff; font-family:sans-serif;
    ">
        <div id="settings-back" style="
            position:absolute; top:16px; left:16px; font-size:18px;
            cursor:pointer; color:rgba(255,255,255,0.7); padding:8px 12px;
        ">← 返回</div>
        <div style="position:absolute; top:18px; left:0; right:0; text-align:center; font-size:20px; font-weight:bold;">Vibe Launcher设置</div>
        <div style="position:absolute; top:70px; left:20px; right:20px; bottom:80px; overflow-y:auto;">
            <div style="margin-bottom:16px; font-size:14px; color:rgba(255,255,255,0.6);">图标分辨率</div>
            <div id="settings-icon-res" style="display:flex; align-items:center; gap:8px;">
                    <input id="settings-icon-input" type="number" value="512" min="16" step="16" style="flex:1; padding:14px; font-size:16px; background:#1a1a2e; color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:8px; outline:none;">
                    <span style="font-size:14px; color:rgba(255,255,255,0.4); white-space:nowrap;">px（默认512）</span>
                </div>
            <div style="margin:20px 0 16px 0; font-size:14px; color:rgba(255,255,255,0.6);">3D球体大小</div>
            <div id="settings-sphere-size" style="display:flex; align-items:center; gap:8px;">
                    <input id="settings-sphere-input" type="number" value="2.5" min="0" style="flex:1; padding:14px; font-size:16px; background:#1a1a2e; color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:8px; outline:none;">
                    <span id="sphere-min-hint" style="font-size:14px; color:rgba(255,255,255,0.4); white-space:nowrap;">最少 —</span>
                </div>
            <div style="margin:20px 0 16px 0; font-size:14px; color:rgba(255,255,255,0.6);">3D布局方式</div>
            <div id="settings-layout" style="display:flex; gap:12px;">
                <div class="settings-radio" onclick="setRadio('settings-layout',this)" data-val="sphere" style="flex:1; padding:14px; text-align:center; background:#1a1a2e; border:2px solid #4a90d9; border-radius:8px; cursor:pointer; color:#fff; font-size:15px;">🌐 3D球体</div>
                <div class="settings-radio" onclick="setRadio('settings-layout',this)" data-val="flat" style="flex:1; padding:14px; text-align:center; background:#1a1a2e; border:2px solid rgba(255,255,255,0.2); border-radius:8px; cursor:pointer; color:#fff; font-size:15px;">📱 平铺</div>
            </div>
        </div>
        <div id="settings-save" style="
            position:absolute; bottom:40px; left:20px; right:20px;
            padding:14px; text-align:center; font-size:16px; font-weight:bold;
            background:#4a90d9; border-radius:10px; cursor:pointer;
        ">保存</div>
    </div>
    <div class="app-label" id="appLabel"></div>
    <div class="loading-indicator" id="loadingIndicator">正在加载应用…</div>

<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.185.1/build/three.module.js",
    "three/webgpu": "https://unpkg.com/three@0.185.1/build/three.webgpu.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three/webgpu';
window.THREE = THREE;

(async function() {
console.log("IIFE starting, THREE:", typeof THREE);
            if (typeof THREE === 'undefined') {
                document.getElementById('loadingIndicator').textContent = 'Three.js 未加载';
                return;
            }

            // ========== 球面库仑斥力分布（Thomson 问题）==========
            function sphereCoulomb(N, opts = {}) {
                const { radius = 1, iter = 400, damp = 0.985, dt = 0.03, tol = 1e-6, soft = 0.01 } = opts;
                if (N <= 0) return [];
                if (N === 1) return [[0, 0, radius]];

                const p = Array.from({ length: N }, () => {
                    const u = Math.random() * 2 - 1,
                        th = Math.random() * Math.PI * 2;
                    const r = Math.sqrt(1 - u * u) * radius;
                    return [r * Math.cos(th), u * radius, r * Math.sin(th)];
                });
                const v = Array.from({ length: N }, () => [0, 0, 0]);
                const f = Array.from({ length: N }, () => [0, 0, 0]);

                for (let t = 0; t < iter; t++) {
                    for (let i = 0; i < N; i++) f[i][0] = f[i][1] = f[i][2] = 0;

                    for (let i = 0; i < N; i++) {
                        for (let j = i + 1; j < N; j++) {
                            const dx = p[i][0] - p[j][0],
                                dy = p[i][1] - p[j][1],
                                dz = p[i][2] - p[j][2];
                            const d2 = dx * dx + dy * dy + dz * dz + soft * soft;
                            const k = 1 / (d2 * Math.sqrt(d2));
                            const fx = k * dx,
                                fy = k * dy,
                                fz = k * dz;
                            f[i][0] += fx;
                            f[i][1] += fy;
                            f[i][2] += fz;
                            f[j][0] -= fx;
                            f[j][1] -= fy;
                            f[j][2] -= fz;
                        }
                    }

                    let maxV = 0;
                    for (let i = 0; i < N; i++) {
                        const x = p[i][0],
                            y = p[i][1],
                            z = p[i][2];
                        const len = Math.sqrt(x * x + y * y + z * z);
                        const nx = x / len,
                            ny = y / len,
                            nz = z / len;
                        const dot = f[i][0] * nx + f[i][1] * ny + f[i][2] * nz;
                        const ftx = f[i][0] - dot * nx,
                            fty = f[i][1] - dot * ny,
                            ftz = f[i][2] - dot * nz;

                        v[i][0] = (v[i][0] + ftx * dt) * damp;
                        v[i][1] = (v[i][1] + fty * dt) * damp;
                        v[i][2] = (v[i][2] + ftz * dt) * damp;

                        const spd = Math.sqrt(v[i][0] ** 2 + v[i][1] ** 2 + v[i][2] ** 2);
                        if (spd > maxV) maxV = spd;

                        let px = x + v[i][0] * dt,
                            py = y + v[i][1] * dt,
                            pz = z + v[i][2] * dt;
                        const plen = Math.sqrt(px * px + py * py + pz * pz);
                        p[i][0] = px * radius / plen;
                        p[i][1] = py * radius / plen;
                        p[i][2] = pz * radius / plen;
                    }
                    if (maxV < tol) break;
                }
                return p;
            }

            var labelEl = document.getElementById('appLabel');
            var loadingEl = document.getElementById('loadingIndicator');

            // ========== 场景 ==========
            var scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            var FAR_PLANE = 1e8;
            var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, FAR_PLANE);
            var renderer = new THREE.WebGPURenderer({ antialias: true, forceWebGL: false });
await renderer.init();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            if (renderer.outputColorSpace !== undefined) {
                renderer.outputColorSpace = THREE.SRGBColorSpace;
            }
            document.body.appendChild(renderer.domElement);
            var canvas = renderer.domElement;

            scene.add(new THREE.AmbientLight(0x8899bb, 2.4));
            var dl = new THREE.DirectionalLight(0xffffff, 1.8);
            dl.position.set(2, 3, 5);
            scene.add(dl);
            var d2 = new THREE.DirectionalLight(0x8899cc, 0.9);
            d2.position.set(-3, -1, -2);
            scene.add(d2);

            var sphereGroup = new THREE.Group();
            scene.add(sphereGroup);

            // ========== 常量 ==========
            var SPHERE_RADIUS = 2.5;
            var layoutMode = 'sphere'; // sphere | flat
            var SPHERE_DIAMETER = SPHERE_RADIUS * 2;
            var BASE_SCALE = 0.52;
            var ICON_RES = 512;
            try {
                var _saved = JSON.parse(localStorage.getItem('vibe-settings') || '{}');
                if (_saved.iconRes && parseInt(_saved.iconRes) >= 16) ICON_RES = parseInt(_saved.iconRes);
            } catch(e) {}
            var HOVER_SCALE = 0.72;
            var FOV_RAD = THREE.MathUtils.degToRad(50);
            var MIN_ZOOM = 0.1;
            
            var ROTATION_ANIM_DURATION = 800; // 旋转动画时长

            function computeInitDistance() {
                var w = window.innerWidth;
                var h = window.innerHeight;
                var shortEdgeFactor = Math.min(1, w / h);
                var minVisible = SPHERE_DIAMETER / (2 * Math.tan(FOV_RAD / 2) * shortEdgeFactor);
                return minVisible * 1.15;
            }

            var zoomLevel = computeInitDistance();
            var defaultZoom = zoomLevel;
            camera.position.set(0, 0, zoomLevel);

            function applyZoom() { camera.position.z = zoomLevel; }

            function computeTimeViewZoom() {
                var R = BASE_SCALE * 0.44;
                var fovHalfRad = THREE.MathUtils.degToRad(camera.fov / 2);
                var aspect = window.innerWidth / window.innerHeight;
                var halfDiagonalNDC = Math.sqrt(aspect * aspect + 1);
                var distance = R / (Math.tan(fovHalfRad) * halfDiagonalNDC);
                return SPHERE_RADIUS + distance;
            }

            var timeViewZoom = computeTimeViewZoom();
            var isInTimeView = false;
            var timeSprite = null;
            var timeTextureUpdateInterval = null;
            var exitThresholdRatio = 0.35;

            var bottomSwipeData = null;
                topSwipeData = null;
            var topSwipeData = null;
            var TOP_ZONE_RATIO = 0.15;
            var BOTTOM_ZONE_RATIO = 0.15;
            var BOTTOM_ZONE_RATIO = 0.22;

            // 缩放动画
            var zoomTarget = null;
            var zoomAnimStart = null;
            var zoomAnimDuration = 0;
            var zoomAnimElapsed = 0;
            var zoomAnimStartVal = 0;
            var zoomAnimEndVal = 0;
            var zoomAnimCallback = null;

            // 旋转动画（用于点击时间图标返回时间视图）
            var rotationAnimData = null;

            function startZoomAnimation(targetVal, duration, callback) {
                zoomAnimStart = performance.now();
                zoomAnimDuration = duration || 500;
                zoomAnimStartVal = zoomLevel;
                zoomAnimEndVal = targetVal;
                zoomAnimElapsed = 0;
                zoomTarget = targetVal;
                zoomAnimCallback = callback || null;
            }

            function cancelZoomAnimation() {
                zoomTarget = null;
                zoomAnimStart = null;
                zoomAnimDuration = 0;
                zoomAnimCallback = null;
            }

            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function updateZoomAnimation(now) {
                if (zoomTarget === null) return;
                zoomAnimElapsed = now - zoomAnimStart;
                var t = Math.min(1, zoomAnimElapsed / zoomAnimDuration);
                var eased = easeOutCubic(t);
                zoomLevel = zoomAnimStartVal + (zoomAnimEndVal - zoomAnimStartVal) * eased;
                applyZoom();
                if (t >= 1) {
                    zoomLevel = zoomAnimEndVal;
                    applyZoom();
                    var cb = zoomAnimCallback;
                    cancelZoomAnimation();
                    if (cb) cb();
                }
            }

            function updateRotationAnimation(now) {
                if (!rotationAnimData) return;
                var elapsed = now - rotationAnimData.startTime;
                var t = Math.min(1, elapsed / rotationAnimData.duration);
                var eased = easeOutCubic(t);
                rotationQuat.copy(rotationAnimData.from).slerp(rotationAnimData.to, eased);
                sphereGroup.quaternion.copy(rotationQuat);
                if (t >= 1) {
                    rotationQuat.copy(rotationAnimData.to);
                    sphereGroup.quaternion.copy(rotationQuat);
                    var cb = rotationAnimData.callback;
                    rotationAnimData = null;
                    if (cb) cb();
                }
            }

            function startRotationAnimation(targetQuat, duration, callback) {
                rotationAnimData = {
                    from: rotationQuat.clone(),
                    to: targetQuat.clone(),
                    startTime: performance.now(),
                    duration: duration || ROTATION_ANIM_DURATION,
                    callback: callback || null
                };
                if (callback && duration <= 0) {
                    rotationQuat.copy(targetQuat);
                    sphereGroup.quaternion.copy(rotationQuat);
                    rotationAnimData = null;
                    callback();
                }
            }

            // ========== 设置纹理 ==========
            function createGearTexture() {
                console.log('createGearTexture size:', ICON_RES);
                var s = Math.max(16, ICON_RES), ca = document.createElement('canvas');
                ca.width = s; ca.height = s;
                var ctx = ca.getContext('2d'), cx = s/2, cy = s/2, rr = s * 0.44;
                ctx.fillStyle = '#000000';
                ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = s * 0.012;
                ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = 'bold ' + (s * 0.45) + 'px sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('⚙', cx, cy);
                var tex = new THREE.CanvasTexture(ca);
                tex.minFilter = THREE.LinearFilter;
                tex.magFilter = THREE.LinearFilter;
                if (tex.colorSpace !== undefined) tex.colorSpace = THREE.SRGBColorSpace;
                return tex;
            }

            // ========== 时间纹理 ==========
            function createTimeTexture() {
                var s = Math.max(window.innerWidth, window.innerHeight);
                var c = document.createElement('canvas');
                c.width = s;
                c.height = s;
                var ctx = c.getContext('2d');
                var cx = s / 2;
                var cy = s / 2;
                var r = s * 0.44;

                // 背景圆
                ctx.fillStyle = '#0a0e18';
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();

                // 外圈
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = s * 0.012;
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.stroke();

                var tex = new THREE.CanvasTexture(c);
                tex.minFilter = THREE.LinearFilter;
                tex.magFilter = THREE.LinearFilter;
                if (tex.colorSpace !== undefined) tex.colorSpace = THREE.SRGBColorSpace;
                return tex;
            }

            function updateTimeSpriteTexture() {
                if (!timeSprite || !timeSprite.material) return;
                var newTex = createTimeTexture();
                if (timeSprite.material.map) {
                    timeSprite.material.map.dispose();
                }
                timeSprite.material.map = newTex;
                timeSprite.material.needsUpdate = true;
            }

            function startTimeTextureUpdates() {
                stopTimeTextureUpdates();
                updateTimeSpriteTexture();
                timeTextureUpdateInterval = setInterval(async function() {
                    if (timeSprite && timeSprite.material) {
                        updateTimeSpriteTexture();
                    }
                }, 30000);
            }

            function stopTimeTextureUpdates() {}

            // ========== 进入/退出时间视图 ==========
            function enterTimeView(animate, onComplete) {
                if (isInTimeView || !timeSprite) return;
                isInTimeView = true;
                cancelZoomAnimation();
                rotationAnimData = null;
                inertiaQ.identity();
                inertiaStrength = 0;
                recentSpeeds = [];
                clearHover();
                document.body.style.cursor = 'default';
                updateTimeSpriteTexture();
                startTimeTextureUpdates();
                var targetZoom = computeTimeViewZoom();
                timeViewZoom = targetZoom;
                if (animate) {
                    startZoomAnimation(targetZoom, 600, function() {
                        zoomLevel = targetZoom;
                        applyZoom();
                        if (onComplete) onComplete();
                        // 显示原生时间页面覆盖层（最高分辨率）
                        var tp = document.getElementById('time-page');
                        if (tp) { tp.style.visibility = 'visible'; tp.style.zIndex = '100'; tp.style.pointerEvents = 'none'; }
                    });
                } else {
                    zoomLevel = targetZoom;
                    applyZoom();
                    if (onComplete) onComplete();
                    var tp = document.getElementById('time-page');
                    if (tp) { tp.style.visibility = 'visible'; tp.style.zIndex = '100'; tp.style.pointerEvents = 'none'; }
                }
            }

            function exitTimeView(animate, callback) {
                if (!isInTimeView) return;
                isInTimeView = false;
                // 隐藏原生时间页面
                var tp = document.getElementById('time-page');
                if (tp) { tp.style.visibility = 'hidden'; tp.style.zIndex = '-1'; tp.style.pointerEvents = 'none'; }
                cancelZoomAnimation();
                rotationAnimData = null;
                stopTimeTextureUpdates();
                bottomSwipeData = null;
                topSwipeData = null;
                document.body.style.cursor = 'grab';
                if (timeSprite) {
                    timeSprite.scale.set(BASE_SCALE, BASE_SCALE, 1);
                }
                var targetZoom = defaultZoom;
                if (animate) {
                    startZoomAnimation(targetZoom, 500, function() {
                        zoomLevel = targetZoom;
                        applyZoom();
                        if (callback) callback();
                    });
                } else {
                    zoomLevel = targetZoom;
                    applyZoom();
                    if (callback) callback();
                }
            }

            // 点击时间图标返回时间视图
            function returnToTimeView() {
                if (isInTimeView || !timeSprite) return;
                isInTimeView = true;
                // 取消当前所有动画
                cancelZoomAnimation();
                rotationAnimData = null;
                inertiaQ.identity();
                inertiaStrength = 0;
                recentSpeeds = [];
                clearHover();
                document.body.style.cursor = 'default';

                // 计算需要旋转的目标四元数：使时间图标正对摄像机
                var timePos = timeSprite.position.clone();
                var targetDir = timePos.clone().normalize();
                var cameraDir = new THREE.Vector3(0, 0, 1);
                var targetQuat = new THREE.Quaternion().setFromUnitVectors(targetDir, cameraDir);

                // 同时执行旋转和缩放动画
                var zoomComplete = false;
                var rotationComplete = false;
                var targetZoom = computeTimeViewZoom();
                timeViewZoom = targetZoom;

                function checkBothComplete() {
                    if (zoomComplete && rotationComplete) {
                        var tp = document.getElementById('time-page');
                        if (tp) { tp.style.visibility = 'visible'; tp.style.zIndex = '100'; tp.style.pointerEvents = 'none'; }
                        updateTimeSpriteTexture();
                        startTimeTextureUpdates();
                    }
                }

                startRotationAnimation(targetQuat, ROTATION_ANIM_DURATION, function() {
                    rotationComplete = true;
                    checkBothComplete();
                });

                startZoomAnimation(targetZoom, ROTATION_ANIM_DURATION, function() {
                    zoomLevel = targetZoom;
                    applyZoom();
                    zoomComplete = true;
                    checkBothComplete();
                });
            }

            // ========== 纹理生成 ==========
            var placeholderColors = [
                '#ff6b6b', '#ff8e72', '#ffa94d', '#ffd43b', '#a9e34b',
                '#69db7c', '#38d9a9', '#3bc9db', '#4dabf7', '#5c7cfa',
                '#748ffc', '#9775fa', '#da77f2', '#f783ac', '#ff8787',
                '#ffb8a8', '#ffc078', '#ffe066', '#c0eb75', '#8ce99a',
                '#63e6be', '#66d9e8', '#74c0fc', '#91a7ff', '#b197fc',
            ];

            function createPlaceholderTexture(appName, colorHex) {
                console.log('createPlaceholderTexture', appName, 'size:', ICON_RES);
                var s = Math.max(16, ICON_RES),
                    c = document.createElement('canvas');
                c.width = s;
                c.height = s;
                var ctx = c.getContext('2d'),
                    cx = s / 2,
                    cy = s / 2,
                    r = s * 0.44;
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = colorHex + 'aa';
                ctx.lineWidth = s * 0.03;
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.stroke();
                var initial = (appName || '?').charAt(0).toUpperCase();
                ctx.fillStyle = '#ffffff';

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = colorHex;
                ctx.shadowBlur = s * 0.1;
                ctx.fillText(initial, cx, cy);
                ctx.shadowBlur = 0;

                tex.magFilter = THREE.LinearFilter;
                if (tex.colorSpace !== undefined) tex.colorSpace = THREE.SRGBColorSpace;

            function createIconTextureFromImage(img) {

                c2.width = s;
                c2.height = s;
                var ctx2 = c2.getContext('2d');
                ctx2.beginPath();
                ctx2.arc(cx, cy, r, 0, Math.PI * 2);
                ctx2.clip();
                var imgSize = Math.min(img.width, img.height);
                var sx = (img.width - imgSize) / 2,
                    sy = (img.height - imgSize) / 2;
                ctx2.drawImage(img, sx, sy, imgSize, imgSize, margin, margin, s - margin * 2, s - margin * 2);
                ctx2.beginPath();
                ctx2.arc(cx, cy, r, 0, Math.PI * 2);
                ctx2.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx2.lineWidth = s * 0.025;
                ctx2.stroke();
                var tex = new THREE.CanvasTexture(c2);
                tex.minFilter = THREE.LinearFilter;
                tex.magFilter = THREE.LinearFilter;
                if (tex.colorSpace !== undefined) tex.colorSpace = THREE.SRGBColorSpace;

            function createFlatLayout(items) {
                var N = items.length;
                if (N === 0) return [];
                var cols = Math.ceil(Math.sqrt(N * (window.innerWidth / window.innerHeight)));
                var rows = Math.ceil(N / cols);
                var spacing = SPHERE_RADIUS * 1.5 / Math.max(cols, rows);
                var points = [];
                var cx = (cols - 1) * spacing * 0.5;
                var cy = (rows - 1) * spacing * 0.5;
                for (var i = 0; i < N; i++) {
                    var row = Math.floor(i / cols);
                    var col = i % cols;
                    var x = col * spacing - cx;
                    var y = -(row * spacing - cy);
                    points.push([x, y, 0]);
                }
                return points;
            }

            function createSprites(appList, iconMap) {

window._totalItems = totalItems;

                var targetDir = timePos.clone().normalize();

                var rotatedPoints = rawPoints.map(function(p) {

                for (var j = 0; j < N; j++) {

                        sprites.push(appSprite);

                        if (iconMap && iconMap[app.packageName]) {

                }

                rotationQuat.identity();
                sphereGroup.quaternion.identity();

                // 更新最小球体半径提示

                        defaultZoom = computeInitDistance();

            function screenToSphere(sx, sy) {
                var rect = canvas.getBoundingClientRect();
                var nx = (sx - rect.left) / rect.width;
                var ny = (sy - rect.top) / rect.height;
                var v = new THREE.Vector3();
                v.x = nx * 2 - 1;
                v.y = -(ny * 2 - 1);
                var a = rect.width / rect.height;
                v.x *= a;
                var magSq = v.x * v.x + v.y * v.y;
                if (magSq <= 1.0) v.z = Math.sqrt(1.0 - magSq);
                else {
                    var inv = 1.0 / Math.sqrt(magSq);
                    v.x *= inv;
                    v.y *= inv;
                    v.z = 0;
                }
                return v.normalize();
            }

            function updateMouse(cx, cy) {

            }

            function quatAngle(q) { return 2 * Math.acos(Math.min(1, Math.abs(q.w))); }

                    for (var i = 0; i < recentSpeeds.length; i++) sum += recentSpeeds[i];
                    inertiaStrength = Math.min(1.5, Math.max(0.3, (sum / recentSpeeds.length) * 80));

            function resetAllPointers() {

            }

            function isInBottomZone(clientY) {
                return clientY > window.innerHeight * (1 - BOTTOM_ZONE_RATIO);

            function isInTopZone(clientY) {

            function onPointerDown(e) { try{NativeBridge.log('PDOWN');}catch(e){}

                    var menu = document.getElementById('context-menu');
                    if (menu && menu.style.display === 'block') {
                        var rect = menu.getBoundingClientRect();
                        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
                            hideContextMenu();

                    }

                    activePointerIds.add(e.pointerId);

                    return;
                }
                if (isInTimeView && activePointerIds.size === 0) {
                    if (isInBottomZone(e.clientY)) {
                        bottomSwipeData = {
                            pointerId: e.pointerId,
                            startY: e.clientY,
                            startZoom: zoomLevel,
                            active: true,
                            confirmed: false,
                            minY: e.clientY,

                        activePointerIds.add(e.pointerId);
                        document.body.style.cursor = 'grabbing';
                        cancelZoomAnimation();
                        return;
                    } else {
                        return;
                    }
                }
                if (isInTimeView) return;

                activePointerIds.add(e.pointerId);
                if (activePointerIds.size === 1) {
                    isDragging = true;
                    hasMoved = false;
                    prevScreen.set(e.clientX, e.clientY);
                    document.body.style.cursor = 'grabbing';
updateMouse(e.clientX, e.clientY);
                    checkHover(e);
                    // 长按检测：直接定时600ms，到时raycaster检测
                    var _lpX2 = e.clientX, _lpY2 = e.clientY;
                    clearLongPressTimer();
                    longPressFired = false;
                    if (!isInTimeView) {
                        longPressTimer = setTimeout(function() {
                            NativeBridge.log("lp-timer-fired");
                            updateMouse(_lpX2, _lpY2);
                            raycaster.setFromCamera(mouse, camera);
                            var hits = raycaster.intersectObjects(sprites);
                            var spr = hits.length > 0 ? hits[0].object : null;
                            if (spr) {

            function onPointerMove(e) {

                    var dY = e.clientY - topSwipeData.startY;
                    if (dY > 3 && !topSwipeData.confirmed) topSwipeData.confirmed = true;
                    if (topSwipeData.confirmed || dY > 8) {
                        topSwipeData.confirmed = true;
                        var md = window.innerHeight * 0.6;
                        var cd = Math.max(0, Math.min(md, dY));
                        var zr = defaultZoom - topSwipeData.startTimeViewZoom;
                        zoomLevel = Math.max(MIN_ZOOM, Math.min(defaultZoom, topSwipeData.startZoom - (cd/md) * zr));
                        applyZoom();

                }
                if (isInTimeView && bottomSwipeData && bottomSwipeData.active &&

                        var tp = document.getElementById('time-page');
                        if (tp) { tp.style.visibility = 'hidden'; tp.style.zIndex = '-1'; }
                        var screenH = window.innerHeight;
                        var maxDelta = screenH * 0.7;
                        var clampedDelta = Math.max(0, Math.min(maxDelta, deltaY));
                        var zoomRange = defaultZoom - timeViewZoom;
                        var targetZ = bottomSwipeData.startZoom + (clampedDelta / maxDelta) * zoomRange * 1.3;

                    if (e.clientY < bottomSwipeData.minY) {

                    return;

                if (!isInTimeView && (!hasMoved || activePointerIds.size !== 1)) checkHover(e);
                // 持续追踪长按目标                }
                if (!isDragging || activePointerIds.size !== 1 || isInTimeView) {

                var curr = new THREE.Vector2(e.clientX, e.clientY);
                var dist = Math.sqrt(prevScreen.distanceToSquared(curr));
                if (!hasMoved && dist > DRAG_THRESHOLD) {
                    hasMoved = true;
                    clearLongPressTimer();
                    clearHover();

                if (!hasMoved || dist < 0.5) return;

                    var texCanvas = document.createElement('canvas');

                    var ctx = texCanvas.getContext('2d');
                    var cx = s/2, cy = s/2, r = s * 0.44;

                    // 背景圆
                    ctx.fillStyle = '#0a0e18';
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                    // 外圈
                    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                    ctx.lineWidth = s * 0.012;
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();

                    // 裁切圆内，绘制 DOM 截图
                    ctx.save();
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
                    var aspect = window.innerWidth / window.innerHeight;
                    var diag = Math.sqrt(aspect*aspect + 1);
                    var rectW = 2 * r * (aspect / diag);
                    var rectH = 2 * r * (1 / diag);
                    ctx.drawImage(domCanvas, cx - rectW/2, cy - rectH/2, rectW, rectH);
                    ctx.restore();

                    console.log('html2canvas OK: ' + domCanvas.width + 'x' + domCanvas.height);

                            var alignQ = new THREE.Quaternion().setFromUnitVectors(timePos.clone().normalize(), new THREE.Vector3(0,0,1));
                            rawPoints = rawPoints.map(function(p) {
                                var v = new THREE.Vector3(p[0],p[1],p[2]);
                                v.applyQuaternion(alignQ);
                                return v;
                            });
                        }
                        for (var k = 0; k < sprites.length; k++) {
                            if (k < rawPoints.length) {
                                sprites[k].position.copy(rawPoints[k]);
                            }
                        }
                        sphereGroup.quaternion.copy(rotationQuat);
                        defaultZoom = computeInitDistance();
                        timeViewZoom = computeTimeViewZoom();
                    }
                    }
                });
            }

            function init() {
                zoomLevel = computeInitDistance();
                defaultZoom = zoomLevel;
                timeViewZoom = computeTimeViewZoom();
                camera.position.set(0, 0, zoomLevel);
                applyZoom();
                isInTimeView = false;
                initSettingsPanel();
                // 上下文菜单事件
                var ctxInfo = document.getElementById('ctx-app-info');
                var ctxUninstall = document.getElementById('ctx-uninstall');
                if (ctxInfo) ctxInfo.addEventListener('click', function() {
                    var menu = document.getElementById('context-menu');
                    var pkg = menu ? menu.getAttribute('data-pkg') : null;
                    NativeBridge.log("ctx-info " + pkg); if (pkg && nativeBridgeReady) NativeBridge.log('details-result ' + NativeBridge.openAppDetails(pkg));
                    hideContextMenu();
                });
                if (ctxUninstall) ctxUninstall.addEventListener('click', function() {
                    var menu = document.getElementById('context-menu');
                    var pkg = menu ? menu.getAttribute('data-pkg') : null;
                    NativeBridge.log("ctx-uninstall " + pkg); if (pkg && nativeBridgeReady) NativeBridge.log('uninst-result ' + NativeBridge.uninstallApp(pkg));
                    hideContextMenu();
                });
                requestAnimationFrame(animate);
                tryLoadApps();
                setTimeout(function() { updateBatteryDisplay(); }, 3000);
                console.log('🚀 3D 桌面已就绪');
            }

            init();
        })();
    </script>
</body>
</html>
