<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用启动器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #e0e0e0;
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #1e1e1e;
            padding: 12px 16px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
        }
        #searchInput {
            flex: 1;
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background: #333;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        #searchInput::placeholder { color: #888; }
        #appCount {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
        }
        #appList {
            padding: 8px 0 80px;
        }
        .app-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #1a1a1a;
        }
        .app-item:active { background: #2a2a2a; }
        .app-item .icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            flex-shrink: 0;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 10px;
            color: #666;
        }
        .app-item .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .app-item .info {
            flex: 1;
            min-width: 0;
        }
        .app-item .name {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .app-item .pkg {
            font-size: 12px;
            color: #777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .app-item .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: #333;
            color: #888;
            flex-shrink: 0;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        .hidden { display: none !important; }
        .no-result {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📱 应用列表</h1>
        <input id="searchInput" type="text" placeholder="搜索应用...">
        <span id="appCount"></span>
    </div>
    <div id="appList">
        <div class="loading">正在加载应用列表...</div>
    </div>
    <div id="noResult" class="no-result hidden">没有匹配的应用</div>
    <div id="toast"></div>

    <script>
        const appList = document.getElementById('appList');
        const searchInput = document.getElementById('searchInput');
        const appCount = document.getElementById('appCount');
        const noResult = document.getElementById('noResult');
        const toast = document.getElementById('toast');

        let allApps = [];
        let iconCache = {};

        // Load apps on startup
        (function init() {
            try {
                const result = JSON.parse(NativeBridge.getInstalledApps());
                if (result.success) {
                    allApps = result.apps;
                    renderApps(allApps);
                    appCount.textContent = allApps.length + ' 个';
                    // Lazy load icons
                    loadIconsInBatches(allApps, 0);
                } else {
                    appList.innerHTML = '<div class="loading">加载失败: ' + (result.error || '未知错误') + '</div>';
                }
            } catch (e) {
                appList.innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
            }
        })();

        function renderApps(apps) {
            appList.innerHTML = '';
            if (apps.length === 0) {
                noResult.classList.remove('hidden');
                return;
            }
            noResult.classList.add('hidden');

            apps.forEach(function(app) {
                var item = document.createElement('div');
                item.className = 'app-item';
                item.dataset.pkg = app.packageName;
                item.innerHTML =
                    '<div class="icon" id="icon-' + encode(app.packageName) + '">' +
                        '<span>' + app.appName.charAt(0).toUpperCase() + '</span>' +
                    '</div>' +
                    '<div class="info">' +
                        '<div class="name">' + esc(app.appName) + '</div>' +
                        '<div class="pkg">' + esc(app.packageName) + '</div>' +
                    '</div>' +
                    (app.isSystem ? '<span class="badge">系统</span>' : '');

                item.addEventListener('click', function() {
                    launch(app.packageName, app.appName);
                });

                appList.appendChild(item);
            });
        }

        function loadIconsInBatches(apps, startIndex) {
            var batchSize = 20;
            var end = Math.min(startIndex + batchSize, apps.length);

            for (var i = startIndex; i < end; i++) {
                loadIcon(apps[i].packageName);
            }

            if (end < apps.length) {
                setTimeout(function() {
                    loadIconsInBatches(apps, end);
                }, 100);
            }
        }

        function loadIcon(packageName) {
            if (iconCache[packageName]) return;
            iconCache[packageName] = true;

            try {
                var result = JSON.parse(NativeBridge.getAppIcon(packageName));
                if (result.success && result.icon) {
                    var el = document.getElementById('icon-' + encode(packageName));
                    if (el) {
                        el.innerHTML = '<img src="' + result.icon + '" alt="">';
                    }
                }
            } catch (e) {
                // ignore individual icon load failures
            }
        }

        function launch(packageName, appName) {
            showToast('正在启动 ' + appName + '...');
            try {
                var result = JSON.parse(NativeBridge.launchApp(packageName));
                if (!result.success) {
                    showToast('启动失败: ' + (result.error || '未知错误'));
                }
            } catch (e) {
                showToast('启动失败: ' + e.message);
            }
        }

        // Search
        searchInput.addEventListener('input', function() {
            var query = this.value.trim().toLowerCase();
            if (!query) {
                renderApps(allApps);
                appCount.textContent = allApps.length + ' 个';
                loadIconsInBatches(allApps, 0);
                return;
            }
            var filtered = allApps.filter(function(app) {
                return app.appName.toLowerCase().indexOf(query) !== -1 ||
                       app.packageName.toLowerCase().indexOf(query) !== -1;
            });
            renderApps(filtered);
            appCount.textContent = filtered.length + ' / ' + allApps.length;
            loadIconsInBatches(filtered, 0);
        });

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(function() {
                toast.classList.remove('show');
            }, 2000);
        }

        function esc(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function encode(s) {
            return s.replace(/[^a-zA-Z0-9]/g, '_');
        }
    </script>
</body>
</html>
