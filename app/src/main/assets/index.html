<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DNG Launcher</title>
    <style>
        * { margin:0;padding:0;box-sizing:border-box; }
        html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:grab;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;}
        body:active{cursor:grabbing;}
        canvas{display:block;width:100%;height:100%;}
        #searchWrap{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;width:70%;max-width:360px;}
        #searchInput{width:100%;padding:10px 18px;border:none;border-radius:24px;background:rgba(30,30,30,0.85);color:#fff;font-size:15px;outline:none;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);text-align:center;transition:background .3s;}
        #searchInput:focus{background:rgba(50,50,50,0.9);}
        #searchInput::placeholder{color:#888;}
        #appName{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;color:#fff;font-size:16px;font-weight:600;text-shadow:0 0 20px rgba(255,255,255,0.6);pointer-events:none;transition:opacity .2s;opacity:0;}
        #appName.show{opacity:1;}
        #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(50,50,50,0.9);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:20;}
        #toast.show{opacity:1;}
        #loadingHint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#666;font-size:16px;z-index:5;transition:opacity .4s;}
    </style>
</head>
<body>
<div id="searchWrap"><input id="searchInput" type="text" placeholder="搜索应用..." autocomplete="off"></div>
<div id="appName"></div>
<div id="toast"></div>
<div id="loadingHint">正在加载...</div>
<script src="three.min.js"></script>
<script>
console.log("Three.js loaded, THREE:", typeof THREE);
window.onerror = function(m,s,l,c,e){
  console.error("JS_ERROR: "+m+" at "+s+":"+l+"\\n"+(e&&e.stack||""));
};
(function(){
var THREE = window.THREE;
if(!THREE){ console.error("THREE not found!"); return; }
console.log("THREE version:", THREE.REVISION);

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
var FAR_PLANE = 1e8;
var camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, FAR_PLANE);
var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x8899bb, 2.2));
var d1 = new THREE.DirectionalLight(0xffffff, 1.6); d1.position.set(2,3,5); scene.add(d1);
var d2 = new THREE.DirectionalLight(0x8899cc, 0.8); d2.position.set(-3,-1,-2); scene.add(d2);

var sphereGroup = new THREE.Group(); scene.add(sphereGroup);

var apps = [], filteredApps = [], iconUrlMap = {}, sprites = [], spriteDataMap = new Map();
var MAX_ICONS = 100, SPHERE_RADIUS = 2.5, BASE_SCALE = 0.55;
var FOV_RAD = THREE.MathUtils.degToRad(50), MIN_ZOOM = 0.1;

function computeInitDistance() {
    var w = window.innerWidth, h = window.innerHeight, aspect = w/h;
    return (SPHERE_RADIUS*2)/(2*Math.tan(FOV_RAD/2)*Math.min(1,aspect))*1.15;
}
var zoomLevel = computeInitDistance();
camera.position.set(0,0,zoomLevel);

window.addEventListener('resize',function(){
    renderer.setSize(window.innerWidth,window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
});

var rotationQuat = new THREE.Quaternion();
var isDragging = false, hasMoved = false, DRAG_THRESHOLD = 3;
var prevScreen = new THREE.Vector2();
var inertiaQ = new THREE.Quaternion(), inertiaStrength = 0;
var INERTIA_DECAY = 0.975, INERTIA_FAST_DECAY = 0.85, INERTIA_MIN = 0.0005;
var recentSpeeds = [];

var raycaster = new THREE.Raycaster();
raycaster.params.Sprite = {threshold:0.8};
var mouse = new THREE.Vector2();
var hoveredSprite = null, hoveredIndex = -1;

var appNameEl = document.getElementById('appName');
var toastEl = document.getElementById('toast');
var loadingHint = document.getElementById('loadingHint');

function screenToSphere(sx,sy){
    var rect = renderer.domElement.getBoundingClientRect();
    var nx = (sx-rect.left)/rect.width, ny = (sy-rect.top)/rect.height;
    var v = new THREE.Vector3(nx*2-1, -(ny*2-1), 0);
    var aspect = rect.width/rect.height; v.x *= aspect;
    var magSq = v.x*v.x+v.y*v.y;
    if(magSq<=1.0) v.z = Math.sqrt(1.0-magSq);
    else { var inv = 1.0/Math.sqrt(magSq); v.x*=inv; v.y*=inv; v.z=0; }
    return v.normalize();
}

function checkHover(){
    raycaster.setFromCamera(mouse, camera);
    var intersects = raycaster.intersectObjects(sprites);
    var newHovered = intersects.length>0 ? intersects[0].object : null;
    var newIdx = newHovered ? (spriteDataMap.get(newHovered)||{}).index : -1;
    if(hoveredIndex !== newIdx){
        if(hoveredIndex>=0 && sprites[hoveredIndex]) sprites[hoveredIndex].material.opacity = 0.85;
        if(newIdx>=0 && sprites[newIdx]){
            sprites[newIdx].material.opacity = 1.0;
            appNameEl.textContent = (filteredApps[newIdx]||{}).appName || '';
            appNameEl.classList.add('show');
        } else appNameEl.classList.remove('show');
        hoveredSprite = newHovered; hoveredIndex = newIdx;
    }
}

var activePointers = 0;
function onPointerDown(e){
    activePointers++;
    if(activePointers===1){
        isDragging=true; hasMoved=false;
        prevScreen.set(e.clientX,e.clientY);
        updateMouse(e.clientX,e.clientY);
        checkHover();
    } else { isDragging=false; hasMoved=false; appNameEl.classList.remove('show'); }
}
function updateMouse(x,y){
    var rect = renderer.domElement.getBoundingClientRect();
    mouse.x=((x-rect.left)/rect.width)*2-1;
    mouse.y=-((y-rect.top)/rect.height)*2+1;
}
function onPointerMove(e){
    updateMouse(e.clientX,e.clientY);
    if(!hasMoved||activePointers!==1) checkHover();
    if(!isDragging||activePointers!==1) return;
    var curr = new THREE.Vector2(e.clientX,e.clientY);
    var dist = Math.sqrt(prevScreen.distanceToSquared(curr));
    if(!hasMoved&&dist>DRAG_THRESHOLD){hasMoved=true;appNameEl.classList.remove('show');recentSpeeds=[];}
    if(!hasMoved||dist<0.5) return;
    var p0=screenToSphere(prevScreen.x,prevScreen.y), p1=screenToSphere(curr.x,curr.y);
    var deltaQ=new THREE.Quaternion().setFromUnitVectors(p0,p1);
    rotationQuat.premultiply(deltaQ); rotationQuat.normalize();
    sphereGroup.quaternion.copy(rotationQuat);
    var speed=2*Math.acos(Math.min(1,Math.abs(deltaQ.w)));
    recentSpeeds.push(speed); if(recentSpeeds.length>5) recentSpeeds.shift();
    inertiaQ.copy(deltaQ); prevScreen.copy(curr);
}
function onPointerUp(e){
    activePointers=Math.max(0,activePointers-1);
    if(isDragging&&hasMoved){
        if(recentSpeeds.length>0){inertiaStrength=Math.min(1.5,Math.max(0.3,recentSpeeds.reduce(function(a,b){return a+b;},0)/recentSpeeds.length*80));}
        recentSpeeds=[];
    }
    isDragging=false; hasMoved=false;
    appNameEl.classList.remove('show');
}
window.addEventListener('pagehide',function(){isDragging=false;hasMoved=false;activePointers=0;});
window.addEventListener('pageshow',function(){isDragging=false;hasMoved=false;activePointers=0;});
function onWheel(e){
    e.preventDefault(); zoomLevel+=e.deltaY*0.01; zoomLevel=Math.max(MIN_ZOOM,zoomLevel); camera.position.z=zoomLevel;
}
function onClick(e){
    if(hasMoved) return;
    if(hoveredIndex>=0 && hoveredIndex<filteredApps.length){
        var app = filteredApps[hoveredIndex];
        showToast('启动 '+app.appName+'...');
        try{JSON.parse(NativeBridge.launchApp(app.packageName));}catch(e){}
    }
}
function showToast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastEl._t);toastEl._t=setTimeout(function(){toastEl.classList.remove('show');},2000);}

var pinchStartDist=0,pinchStartZoom=7;
function onTouchStart(e){
    if(e.touches.length===2){pinchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchStartZoom=zoomLevel;isDragging=false;hasMoved=false;}
}
function onTouchMove(e){
    if(e.touches.length===2){e.preventDefault();var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(pinchStartDist>0){zoomLevel=pinchStartZoom*(pinchStartDist/d);zoomLevel=Math.max(MIN_ZOOM,zoomLevel);camera.position.z=zoomLevel;}}
}

var canvas = renderer.domElement;
canvas.addEventListener('pointerdown',onPointerDown);
canvas.addEventListener('pointermove',onPointerMove);
canvas.addEventListener('pointerup',onPointerUp);
canvas.addEventListener('pointerleave',onPointerUp);
canvas.addEventListener('click',onClick);
canvas.addEventListener('wheel',onWheel,{passive:false});
canvas.addEventListener('touchstart',onTouchStart,{passive:false});
canvas.addEventListener('touchmove',onTouchMove,{passive:false});

window._onAppsLoaded = function(result){
    console.log("_onAppsLoaded count:", result.apps?result.apps.length:0);
    if(!result.success) return;
    apps = result.apps.slice(0, MAX_ICONS);
    filteredApps = apps;
    buildSphere();
    loadingHint.style.opacity = '0';
    setTimeout(function(){loadingHint.remove();}, 500);
    requestVisibleIcons();
};

window._onIconsLoaded = function(results){
    console.log("_onIconsLoaded count:", results.length);
    for(var i=0;i<results.length;i++){
        var r = results[i]; iconUrlMap[r.packageName] = r.iconUrl;
        for(var j=0;j<filteredApps.length;j++){
            if(filteredApps[j].packageName===r.packageName && sprites[j])
                loadSpriteTexture(sprites[j], r.iconUrl, j);
        }
    }
};

function requestVisibleIcons(){
    var batch = [];
    for(var i=0;i<filteredApps.length;i++){
        if(!iconUrlMap[filteredApps[i].packageName]) batch.push(filteredApps[i].packageName);
    }
    console.log("requestIcons batch:", batch.length);
    if(batch.length>0) NativeBridge.requestAppIcons(JSON.stringify(batch));
}

function fibonacciSphere(n, radius){
    var pts=[], phi=Math.PI*(3-Math.sqrt(5));
    for(var i=0;i<n;i++){
        var y=1-(i/(n-1))*2, rY=Math.sqrt(1-y*y), th=phi*i;
        pts.push({x:Math.cos(th)*rY*radius, y:y*radius, z:Math.sin(th)*rY*radius});
    }
    return pts;
}

function createPlaceholderTexture(letter, colorHex){
    var s=128, c=document.createElement('canvas'); c.width=s; c.height=s;
    var ctx=c.getContext('2d'), cx=s/2, cy=s/2, r=s*0.42;
    ctx.fillStyle=colorHex+'22'; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=colorHex+'99'; ctx.lineWidth=s*0.028; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(s*0.46)+'px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor=colorHex; ctx.shadowBlur=s*0.08; ctx.fillText(letter,cx,cy);
    var tex=new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
    return tex;
}

function loadSpriteTexture(sprite, iconUrl, index){
    var img = new Image();
    img.onload = function(){
        var s=128, c=document.createElement('canvas'); c.width=s; c.height=s;
        var ctx=c.getContext('2d'), cx=s/2, cy=s/2, r=s*0.42;
        ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
        ctx.drawImage(img,0,0,s,s); ctx.restore();
        ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=s*0.025;
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
        var tex=new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
        sprite.material.map = tex; sprite.material.needsUpdate = true;
    };
    img.src = iconUrl;
}

var palette = ['#ff6b6b','#ff8e72','#ffa94d','#ffd43b','#a9e34b','#69db7c','#38d9a9','#3bc9db','#4dabf7','#5c7cfa','#748ffc','#9775fa','#da77f2','#f783ac','#ff8787'];

function buildSphere(){
    for(var i=0;i<sprites.length;i++) sphereGroup.remove(sprites[i]);
    sprites = []; spriteDataMap = new Map();
    var points = fibonacciSphere(filteredApps.length, SPHERE_RADIUS);
    for(var i=0;i<filteredApps.length;i++){
        var p=points[i], app=filteredApps[i], color=palette[i%palette.length];
        var tex=createPlaceholderTexture(app.appName.charAt(0).toUpperCase(), color);
        var mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.85,depthTest:true,depthWrite:true});
        var sprite=new THREE.Sprite(mat);
        sprite.position.set(p.x,p.y,p.z);
        sprite.scale.set(BASE_SCALE,BASE_SCALE,1);
        spriteDataMap.set(sprite, {index:i});
        sphereGroup.add(sprite);
        sprites.push(sprite);
    }
    console.log("buildSphere done, sprites:", sprites.length);
}

var searchTimer;
document.getElementById('searchInput').addEventListener('input', function(){
    clearTimeout(searchTimer);
    var self = this;
    searchTimer = setTimeout(function(){
        var q = self.value.trim().toLowerCase();
        if(!q) filteredApps = apps;
        else filteredApps = apps.filter(function(a){return a.appName.toLowerCase().indexOf(q)!==-1||a.packageName.toLowerCase().indexOf(q)!==-1;});
        iconUrlMap = {}; buildSphere(); requestVisibleIcons();
    }, 300);
});

function animate(){
    requestAnimationFrame(animate);
    if(inertiaStrength>INERTIA_MIN){
        var factor=Math.min(inertiaStrength,1.0);
        var applyQ=new THREE.Quaternion().slerpQuaternions(new THREE.Quaternion(),inertiaQ,factor);
        rotationQuat.premultiply(applyQ); rotationQuat.normalize();
        sphereGroup.quaternion.copy(rotationQuat);
        inertiaStrength*=(isDragging&&hasMoved)?INERTIA_FAST_DECAY:INERTIA_DECAY;
        if(inertiaStrength<INERTIA_MIN){inertiaStrength=0;inertiaQ.identity();}
    }
    renderer.render(scene,camera);
}
animate();

console.log("Calling NativeBridge.requestInstalledApps...");
NativeBridge.requestInstalledApps();
})();
</script>
</body>
</html>
